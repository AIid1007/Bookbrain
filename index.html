<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
 
// ══════ PDF PARSER (with font size info) ══════
async function parsePDF(file,cb){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const pages=[];
  for(let i=1;i<=pdf.numPages;i++){
    if(cb)cb(i,pdf.numPages);
    const pg=await pdf.getPage(i);
    const tc=await pg.getTextContent();
    let txt='';let maxFontSize=0;let firstLineFontSize=0;let firstLineText='';
    tc.items.forEach((it,idx)=>{
      const fs=Math.abs(it.transform?.[3]||12);
      if(fs>maxFontSize)maxFontSize=fs;
      if(idx<3&&!firstLineText){firstLineFontSize=fs;firstLineText=it.str.trim();}
      txt+=it.str+' ';
    });
    txt=txt.replace(/\s+/g,' ').trim();
    if(txt.length>5)pages.push({pageNum:i,text:txt,maxFS:maxFontSize,firstFS:firstLineFontSize,firstLine:firstLineText});
  }
  return pages;
}
 
// ══════ EPUB PARSER ══════
async function parseEPUB(file,cb){
  const zip=await JSZip.loadAsync(file);
  const cx=await zip.file('META-INF/container.xml')?.async('text');
  if(!cx)throw new Error('Invalid EPUB');
  const opfPath=(cx.match(/full-path="([^"]+)"/)||[])[1];
  if(!opfPath)throw new Error('Invalid EPUB: no OPF');
  const opf=await zip.file(opfPath)?.async('text');if(!opf)throw new Error('Missing OPF');
  const dp=new DOMParser();const od=dp.parseFromString(opf,'application/xml');
  const mf={};
  (od.querySelectorAll('item').length?od.querySelectorAll('item'):od.getElementsByTagName('item'))
    .forEach?.(it=>{mf[it.getAttribute('id')]=it.getAttribute('href');});
  if(!Object.keys(mf).length)od.getElementsByTagName('item').forEach?.(it=>{mf[it.getAttribute('id')]=it.getAttribute('href');});
  // fallback for NodeList without forEach
  const items=od.getElementsByTagName('item');
  if(!Object.keys(mf).length)for(let i=0;i<items.length;i++){mf[items[i].getAttribute('id')]=items[i].getAttribute('href');}
  const spine=[];
  const refs=od.getElementsByTagName('itemref');
  for(let i=0;i<refs.length;i++){const id=refs[i].getAttribute('idref');if(mf[id])spine.push(mf[id]);}
  const base=opfPath.substring(0,opfPath.lastIndexOf('/')+1);
  const pages=[];let pn=1;
  for(let si=0;si<spine.length;si++){
    if(cb)cb(si+1,spine.length);
    const fp=(base+spine[si]).replace(/^\//,'');
    let entry=null;
    zip.forEach((p,e)=>{if(p.toLowerCase()===fp.toLowerCase())entry=e;});
    if(!entry)continue;
    const html=await entry.async('text');
    const doc=dp.parseFromString(html,'text/html');
    const txt=(doc.body?.textContent||'').replace(/\s+/g,' ').trim();
    const h=doc.querySelector('h1,h2,h3');
    if(txt.length>40)pages.push({pageNum:pn++,text:txt,epubTitle:h?h.textContent.trim():'',isEpub:true});
  }
  return pages;
}
 
// ══════ ENHANCED CHAPTER DETECTION ══════
function detectChapters(pages,isEpub){
  const chs=[];
  if(isEpub){
    for(let i=0;i<pages.length;i++){
      const p=pages[i];
      if(p.epubTitle&&p.epubTitle.length>2&&p.text.length>100){
        chs.push({n:chs.length+1,title:p.epubTitle.slice(0,100),ps:p.pageNum,pe:p.pageNum,pidx:[i]});
      }else if(chs.length>0){
        chs[chs.length-1].pe=p.pageNum;chs[chs.length-1].pidx.push(i);
      }else{chs.push({n:1,title:p.epubTitle||'Opening',ps:p.pageNum,pe:p.pageNum,pidx:[i]});}
    }
    return chs;
  }
  // PDF: multi-signal detection
  const pats=[
    /^(?:chapter|ch\.?)\s*(\d+|[ivxlcdm]+)\b[:\s.—–\-]*(.*)/i,
    /^(?:part|section|book)\s*(\d+|[ivxlcdm]+)\b[:\s.—–\-]*(.*)/i,
    /^(\d{1,3})[.:]\s+([A-Z][A-Za-z\s,:'—–-]{4,70})$/m,
    /^(introduction|preface|foreword|prologue|epilogue|conclusion|afterword|acknowledgments)\b[:\s.—–\-]*(.*)/i,
  ];
  // Compute median font size to detect headings
  const fontSizes=pages.map(p=>p.firstFS||12);
  const sorted=[...fontSizes].sort((a,b)=>a-b);
  const medianFS=sorted[Math.floor(sorted.length/2)]||12;
  const headingThreshold=medianFS*1.15;
 
  for(let i=0;i<pages.length;i++){
    const p=pages[i];
    const lines=p.text.split(/\s{3,}|\t/).map(l=>l.trim()).filter(l=>l.length>2);
    let found=false;
    for(const line of lines.slice(0,5)){// check first 5 segments
      for(const pat of pats){
        const m=line.match(pat);
        if(m){
          const title=(m[2]||m[1]||line).trim().replace(/^[:\s.—–-]+/,'');
          if(title.length>1){chs.push({n:chs.length+1,title:title.slice(0,100),ps:p.pageNum,pe:0,pidx:[]});found=true;break;}
        }
      }
      if(found)break;
    }
    // Font-size heading detection: if first line is significantly larger AND short
    if(!found&&p.firstFS>headingThreshold&&p.firstLine&&p.firstLine.length>3&&p.firstLine.length<80){
      // Check it's not just a number or date
      if(!/^\d+$/.test(p.firstLine)&&/[a-zA-Z]{3,}/.test(p.firstLine)){
        chs.push({n:chs.length+1,title:p.firstLine.slice(0,100),ps:p.pageNum,pe:0,pidx:[]});
      }
    }
    // ALL CAPS line detection (common chapter style)
    if(!found){
      for(const line of lines.slice(0,3)){
        if(line.length>4&&line.length<70&&line===line.toUpperCase()&&/[A-Z]{4,}/.test(line)&&!/^\d+$/.test(line)){
          chs.push({n:chs.length+1,title:line.charAt(0)+line.slice(1).toLowerCase(),ps:p.pageNum,pe:0,pidx:[]});break;
        }
      }
    }
  }
  // Deduplicate chapters on same page
  const deduped=[];
  for(const ch of chs){if(!deduped.length||ch.ps!==deduped[deduped.length-1].ps)deduped.push(ch);else if(ch.title.length>deduped[deduped.length-1].title.length)deduped[deduped.length-1]=ch;}
  // Set page ranges
  for(let i=0;i<deduped.length;i++){
    const nextPS=i<deduped.length-1?deduped[i+1].ps:pages[pages.length-1].pageNum+1;
    deduped[i].pe=nextPS-1;deduped[i].pidx=[];
    for(let pi=0;pi<pages.length;pi++){if(pages[pi].pageNum>=deduped[i].ps&&pages[pi].pageNum<=deduped[i].pe)deduped[i].pidx.push(pi);}
  }
  // Fallback: adaptive split
  if(deduped.length<2){
    deduped.length=0;
    const step=Math.max(4,Math.min(15,Math.ceil(pages.length/10)));
    for(let i=0;i<pages.length;i+=step){
      const end=Math.min(i+step-1,pages.length-1);
      const idx=[];for(let j=i;j<=end;j++)idx.push(j);
      const fl=pages[i].firstLine||pages[i].text.slice(0,50);
      deduped.push({n:deduped.length+1,title:fl.slice(0,60)+(fl.length>60?'…':''),ps:pages[i].pageNum,pe:pages[end].pageNum,pidx:idx});
    }
  }
  // Renumber
  deduped.forEach((c,i)=>c.n=i+1);
  return deduped;
}
 
// ══════ ENHANCED HEURISTIC EXTRACTION ══════
function heuristicExtract(pidx,allPages){
  const text=pidx.map(i=>allPages[i]?.text||'').join('\n\n');
  if(text.length<30)return{summary:'',ideas:[],quotes:[],stories:[],stats:[],actions:[],terms:[],mode:'heuristic'};
  const sents=(text.match(/[^.!?]+[.!?]+/g)||[text]).map(s=>s.trim()).filter(s=>s.length>15);
  const paras=text.split(/\n\s*\n/).filter(p=>p.trim().length>40);
  const pg=allPages[pidx[0]]?.pageNum||0;
 
  // ── QUOTES (multiple styles) ──
  const quotes=[];
  const qPats=[/[""\u201c]([^""\u201d]{12,300})[""\u201d]/g, /[''\u2018]([^''\u2019]{20,300})[''\u2019]/g];
  for(const re of qPats){let m;while((m=re.exec(text))!==null){
    const qt=m[1].trim();
    if(qt.length>12&&!/^(http|www|\d+$)/i.test(qt)&&!quotes.find(q=>q.text===qt))
      quotes.push({text:qt,p:pg});
  }}
 
  // ── STATISTICS (comprehensive patterns) ──
  const stats=[];
  const statSignals=[
    /(\d{1,3}(?:,\d{3})*(?:\.\d+)?)\s*(%|percent)/i,
    /\$\s*(\d{1,3}(?:,\d{3})*(?:\.\d+)?)\s*(million|billion|trillion|thousand)?/i,
    /(\d+(?:\.\d+)?)\s*(?:x|×|times)\b/i,
    /(\d+)\s+(?:out of|in every)\s+(\d+)/i,
    /(\d{2,})\s+(?:people|companies|studies|countries|participants|employees|hours|years|months|percent)/i,
    /(?:stud(?:y|ies)|research|survey|data|report)\s+(?:found|show(?:s|ed)?|reveal(?:s|ed)?|indicat(?:e|ed)|suggest(?:s|ed)?)/i,
  ];
  for(const s of sents){
    for(const re of statSignals){
      if(re.test(s)){
        const numMatch=s.match(/[\$]?[\d,]+\.?\d*\s*[%×x]?|\d+\.?\d*\s*(?:percent|million|billion|times|years|months|hours|people|companies)/i);
        if(numMatch&&!stats.find(st=>st.note===s))
          stats.push({fig:numMatch[0].trim(),note:s.slice(0,220),p:pg});
        break;
      }
    }
  }
 
  // ── KEY IDEAS (signal-word weighted) ──
  const sigWords=['important','key','crucial','fundamental','essential','critical','significant',
    'the point is','in other words','this means','the lesson','the takeaway','the implication',
    'what this tells us','the core','the main','the central','ultimately','in essence','at its core',
    'the bottom line','the truth is','the reality is','the principle','the idea','the concept',
    'the argument','the finding','the research shows','the evidence suggests'];
  const ideas=[];
  // First: signal-word sentences
  for(const s of sents){
    const sl=s.toLowerCase();
    const score=sigWords.reduce((sc,w)=>sc+(sl.includes(w)?1:0),0);
    if(score>0&&s.length>30&&s.length<400){
      const para=paras.find(p=>p.includes(s.slice(0,40)));
      const detail=para?para.replace(s,'').trim().slice(0,280):'Elaborated further in the surrounding text.';
      ideas.push({text:s,detail,score});
    }
  }
  // Then: topic sentences (first sentence of substantial paragraphs)
  for(const p of paras){
    if(p.length<60)continue;
    const fs=(p.match(/^[^.!?]+[.!?]/)||[p.slice(0,200)])[0].trim();
    if(fs.length>25&&fs.length<400&&!ideas.find(i=>i.text===fs)){
      ideas.push({text:fs,detail:p.slice(fs.length).trim().slice(0,280)||'Expanded upon in the text.',score:0});
    }
  }
  ideas.sort((a,b)=>(b.score||0)-(a.score||0));
 
  // ── STORIES & EXAMPLES (narrative detection) ──
  const storyPats=[
    /\b(once upon|one day|one morning|one evening|years ago|decades ago|back in \d{4}|in \d{4}|when \w+ was \d+)\b/i,
    /\b(story of|tale of|anecdote|case study|case of|example of|experiment by|study by|research by)\b/i,
    /\b([A-Z][a-z]{2,15}(?:\s+[A-Z][a-z]{2,15})?)\s+(?:was|had|told|said|found|discovered|realized|decided|began|started|noticed|recalled|remembered|described|explained|argued|believed|created|built|invented|developed)\b/,
    /\b(said|told|asked|replied|explained|recalled|remembered|recounted|described|narrated)\b/i,
  ];
  const stories=[];
  for(const p of paras){
    if(p.length<80)continue;
    let isStory=0;
    for(const re of storyPats){if(re.test(p))isStory++;}
    if(isStory>=1){
      const nameMatch=p.match(/\b([A-Z][a-z]{2,15}(?:\s+[A-Z][a-z]{2,15}){0,2})\b/);
      const contextMatch=p.match(/(?:story of|tale of|case of|example of|experiment)\s+([^.]{5,50})/i);
      const title=contextMatch?contextMatch[1].trim():(nameMatch?nameMatch[1]+"'s Story":p.split(/[.!?]/)[0].slice(0,50));
      if(!stories.find(s=>s.title===title))
        stories.push({title:title.trim(),detail:p.trim().slice(0,380),p:pg});
    }
  }
 
  // ── ACTION ITEMS (comprehensive) ──
  const actions=[];
  const impRe=/(?:^|\.\s+)((?:Try|Start|Begin|Consider|Make|Take|Write|Identify|Ask yourself|Create|Build|Practice|Stop|Avoid|Remember|Focus|Set|Establish|Review|List|Schedule|Think about|Reflect on|Notice|Observe|Commit to|Dedicate|Eliminate|Reduce|Increase|Track|Measure|Evaluate|Test|Experiment with|Apply|Implement|Design|Develop|Choose|Pick|Select|Prioritize|Block|Protect|Guard|Batch|Limit|Remove|Replace|Substitute|Adopt)[^.!?]{8,150}[.!?])/gi;
  let m;while((m=impRe.exec(text))!==null){const a=m[1].trim();if(!actions.includes(a))actions.push(a);}
  const shouldRe=/[Yy]ou (?:should|could|must|need to|might want to|ought to|have to)\s+([^.!?]{8,150}[.!?])/g;
  while((m=shouldRe.exec(text))!==null){const a='Consider: '+m[1].trim();if(!actions.includes(a))actions.push(a);}
  const lessonRe=/(?:the (?:lesson|takeaway|key|trick|secret|solution|answer|point)|what (?:works|helps|matters))\s+(?:is|here is|:)\s+([^.!?]{8,150}[.!?])/gi;
  while((m=lessonRe.exec(text))!==null){const a='Key insight: '+m[1].trim();if(!actions.includes(a))actions.push(a);}
 
  // ── TERMS (comprehensive definition detection) ──
  const terms=[];
  const defPats=[
    /[""]?(\w[\w\s]{2,40})[""]?\s+(?:is defined as|refers to|is the concept of|is a term (?:for|meaning)|denotes|signifies|describes the)\s+([^.]{10,200})\./gi,
    /(?:known as|called|termed|dubbed|referred to as|what (?:we|they|he|she|I) call(?:s|ed)?)\s+[""]?(\w[\w\s]{2,40})[""]?/gi,
    /(\w[\w\s]{2,35}):\s+([A-Z][^.]{15,200}\.)/gm,
    /[Tt]he term\s+[""]?(\w[\w\s]{2,35})[""]?\s+(?:means|refers|describes|denotes)\s+([^.]{10,200})\./gi,
  ];
  for(const re of defPats){let m2;while((m2=re.exec(text))!==null){
    const t=(m2[1]||'').trim();const d=(m2[2]||'').trim();
    if(t.length>2&&d.length>8&&!terms.find(x=>x.t.toLowerCase()===t.toLowerCase()))
      terms.push({t,d:d.slice(0,200)});
  }}
  // Repeated capitalized phrases (frequency-based term detection)
  const capRe2=/\b([A-Z][a-z]+(?:\s+[A-Z][a-z]+)+)\b/g;
  const cc={};while((m=capRe2.exec(text))!==null){if(m[1].length>4)cc[m[1]]=(cc[m[1]]||0)+1;}
  for(const[ph,ct]of Object.entries(cc)){
    if(ct>=3&&!terms.find(x=>x.t===ph)){
      const ctx=sents.find(s=>s.includes(ph));
      terms.push({t:ph,d:ctx?ctx.slice(0,200):'A recurring concept in this chapter.'});
    }
  }
 
  // ── SUMMARY ──
  const sumParts=[];
  if(paras[0])sumParts.push(paras[0].slice(0,250));
  if(paras.length>3)sumParts.push(paras[Math.floor(paras.length/2)].slice(0,150));
  if(paras.length>1)sumParts.push(paras[paras.length-1].slice(0,150));
  const summary=sumParts.join(' ').slice(0,450)||sents.slice(0,3).join(' ');
 
  return{summary,ideas:ideas.slice(0,8),quotes:quotes.slice(0,6),stories:stories.slice(0,4),stats:stats.slice(0,5),actions:actions.slice(0,6),terms:terms.slice(0,6),mode:'heuristic'};
}
 
// ══════ GEMMA AI EXTRACTION ══════
async function aiExtractChapter(engine,text){
  const t=text.slice(0,6000);
  const prompt='Extract book insights. Return ONLY valid JSON, no other text:\n{"summary":"2-3 sentences","ideas":[{"text":"insight","detail":"explanation"}],"quotes":[{"text":"exact quote","p":0}],"stories":[{"title":"name","detail":"description","p":0}],"stats":[{"fig":"number","note":"meaning","p":0}],"actions":["takeaway"],"terms":[{"t":"term","d":"definition"}]}\nExtract up to 8 items per category. Be thorough.\n\nTEXT:\n'+t;
  try{
    const r=await engine.chat.completions.create({messages:[{role:"user",content:prompt}],temperature:0.1,max_tokens:3000});
    let j=r.choices[0].message.content.replace(/```json\s*/g,'').replace(/```/g,'').trim();
    const match=j.match(/\{[\s\S]*\}/);
    if(match){const parsed=JSON.parse(match[0]);parsed.mode='gemma';return parsed;}
    throw new Error('No JSON');
  }catch(e){console.warn('AI extract failed:',e);return null;}
}
 
// ══════ AI-POWERED Q&A ══════
async function aiAnswer(engine,question,pages){
  const results=searchText(question,pages);
  if(!results.length)return{text:'No relevant passages found for that question.',src:null};
  const context=results.map(r=>'[p.'+r.pageNum+'] '+r.text.slice(0,600)).join('\n\n');
  try{
    const r=await engine.chat.completions.create({messages:[{role:"user",content:'Based on these book passages, answer the question concisely with page references.\n\nPassages:\n'+context+'\n\nQuestion: '+question}],temperature:0.2,max_tokens:1000});
    return{text:r.choices[0].message.content,src:'pp. '+results.map(r=>r.pageNum).join(', ')};
  }catch(e){return{text:context,src:'pp. '+results.map(r=>r.pageNum).join(', ')};}
}
 
function searchText(q,pages){
  const kw=q.toLowerCase().split(/\s+/).filter(w=>w.length>3);
  if(!kw.length)return[];
  return pages.map(p=>{const t=p.text.toLowerCase();return{...p,score:kw.reduce((s,k)=>s+(t.includes(k)?1:0),0)};}).filter(r=>r.score>0).sort((a,b)=>b.score-a.score).slice(0,4);
}
 
function genMindMap(ch){
  const ins=ch?.insights;if(!ins)return null;
  const cols=[{lc:"#8B6914",dc:"#D4A843"},{lc:"#5A7A4A",dc:"#7AAE5E"},{lc:"#7B5B2A",dc:"#C49A4A"},{lc:"#A0422A",dc:"#D06040"},{lc:"#3A6A8A",dc:"#5AAADA"},{lc:"#7A4A8A",dc:"#AA7ABA"}];
  const br=ins.ideas.slice(0,4).map((idea,i)=>{
    const ch2=[];if(ins.terms[i])ch2.push(ins.terms[i].t);if(ins.quotes[i])ch2.push('"'+ins.quotes[i].text.slice(0,22)+'…"');if(ins.actions[i])ch2.push(ins.actions[i].slice(0,25));if(!ch2.length)ch2.push('Detail');
    return{label:idea.text.length>32?idea.text.slice(0,29)+'…':idea.text,ch:ch2.slice(0,3),...cols[i%6]};
  });
  if(br.length<2&&ins.terms.length)br.push({label:'Key Terms',ch:ins.terms.slice(0,3).map(t=>t.t),...cols[br.length%6]});
  return{center:ch.title?.length>22?ch.title.slice(0,19)+'…':ch.title,branches:br};
}

<script type="text/babel">
const{useState,useCallback,useRef,useEffect,createContext,useContext}=React;
const TH={
  light:{bg:"#E8E0D4",bgL:"#F0E8DC",shL:"#F5EDE1",shD:"#C4BCA8",acc:"#8B6914",accL:"#A6841E",accS:"rgba(139,105,20,.12)",tx:"#2C2416",tx2:"#6B5D4A",tx3:"#9A8B74",ok:"#5A7A4A",okS:"rgba(90,122,74,.15)",warn:"#B8860B",qt:"#7B5B2A",dng:"#A0422A"},

<div style={{...nC(C),padding:8,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
<svg viewBox="0 0 520 400" style={{width:"100%",minWidth:340}}>
{mm.branches.map((b,i)=>{const col=dk?b.dc:b.lc;const a=angs[i]*Math.PI/180;const bx=cx+r1*Math.cos(a),by=cy+r1*Math.sin(a);return<g key={`l${i}`}><line x1={cx} y1={cy} x2={bx} y2={by} stroke={col} strokeWidth="1.5" strokeOpacity=".4"/>{b.ch.map((_,j)=>{const sp=24;const ca=angs[i]+(j-(b.ch.length-1)/2)*sp;const cr=ca*Math.PI/180;return<line key={j} x1={bx} y1={by} x2={cx+r2*Math.cos(cr)} y2={cy+r2*Math.sin(cr)} stroke={col} strokeWidth="1" strokeOpacity=".2"/>;})}</g>;})}
<circle cx={cx} cy={cy} r="34" fill={C.bgL} stroke={C.acc} strokeWidth="1.5"/><text x={cx} y={cy+3} textAnchor="middle" fill={C.acc} fontSize="7" fontFamily="Nunito" fontWeight="700">{mm.center}</text>
{mm.branches.map((b,i)=>{const col=dk?b.dc:b.lc;const a=angs[i]*Math.PI/180;const bx=cx+r1*Math.cos(a),by=cy+r1*Math.sin(a);return<g key={`n${i}`}><rect x={bx-42} y={by-12} width="84" height="24" rx="7" fill={C.bgL} stroke={col} strokeWidth="1"/><text x={bx} y={by+3} textAnchor="middle" fill={col} fontSize="6.5" fontFamily="Nunito" fontWeight="700">{b.label}</text>{b.ch.map((c,j)=>{const sp=24;const ca=angs[i]+(j-(b.ch.length-1)/2)*sp;const cr=ca*Math.PI/180;const cx2=cx+r2*Math.cos(cr),cy2=cy+r2*Math.sin(cr);return<g key={j}><rect x={cx2-36} y={cy2-9} width="72" height="18" rx="5" fill={`${col}14`} stroke={`${col}40`} strokeWidth=".7"/><text x={cx2} y={cy2+3} textAnchor="middle" fill={C.tx2} fontSize="6" fontFamily="Nunito">{typeof c==='string'?c.slice(0,16):''}</text></g>;})}</g>;})}
</svg></div></div>;}
 
/* ══ Q&A ══ */
function QAS({book,engine}){const{dk}=useT();const C=dk?TH.dark:TH.light;
const[inp,sI]=useState("");const[msgs,sM]=useState([]);const[busy,sB]=useState(false);
const btm=useRef(null);useEffect(()=>{btm.current?.scrollIntoView({behavior:"smooth"});},[msgs]);
const send=()=>{if(!inp.trim()||busy||!book)return;const q=inp;sM(m=>[...m,{r:"u",t:q}]);sI("");sB(true);
  if(engine){aiAnswer(engine,q,book.pages).then(a=>{sM(m=>[...m,{r:"a",t:a.text,src:a.src}]);sB(false);});}
  else{setTimeout(()=>{const res=searchText(q,book.pages);
    sM(m=>[...m,res.length?{r:"a",t:res.map(r=>`[p.${r.pageNum}] ${r.text.slice(0,300)}…`).join('\n\n'),src:'pp. '+res.map(r=>r.pageNum).join(', ')}:{r:"a",t:'No matching passages found. Try different keywords.'}]);sB(false);},400);}};
return<div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
  <div style={{padding:"8px 14px",flexShrink:0}}><h2 style={{fontFamily:fD,fontSize:17,fontWeight:700,color:C.tx}}>Ask About This Book</h2><p style={{fontFamily:fB,fontSize:10,color:C.tx3,marginTop:1}}>{engine?'Gemma AI answers with page references':'Keyword search across your book text'}</p></div>
  <div style={{flex:1,overflowY:"auto",padding:"0 14px 10px",display:"flex",flexDirection:"column",gap:8}}>
    {!msgs.length&&<div style={{...nI(C),padding:12,borderRadius:12,textAlign:"center"}}><p style={{fontFamily:fB,fontSize:11,color:C.tx3}}>Ask any question about your book</p></div>}
    {msgs.map((m,i)=><div key={i} style={{alignSelf:m.r==="u"?"flex-end":"flex-start",maxWidth:"85%"}}><div style={{...(m.r==="u"?{...nB(C),background:C.acc}:nC(C)),padding:"8px 10px",borderRadius:12}}><p style={{fontFamily:m.r==="u"?fB:fD,fontSize:12,color:m.r==="u"?(dk?"#1E1E2A":"#fff"):C.tx,lineHeight:1.55,margin:0,whiteSpace:"pre-wrap"}}>{m.t}</p></div>{m.src&&<div style={{marginTop:2}}><Tag color={C.ok}>{m.src}</Tag></div>}</div>)}
    {busy&&<div style={{...nI(C),padding:"7px 10px",alignSelf:"flex-start",borderRadius:10}}><span style={{fontFamily:fB,fontSize:11,color:C.tx3}}>{engine?'Gemma thinking…':'Searching…'}</span></div>}
    <div ref={btm}/>
  </div>
  <div style={{padding:"5px 14px 8px",display:"flex",gap:5,flexShrink:0}}><div style={{...nI(C),flex:1,padding:0}}><input value={inp} onChange={e=>sI(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Ask about the book…" style={{width:"100%",padding:"10px 10px",border:"none",background:"transparent",color:C.tx,fontFamily:fB,fontSize:12,outline:"none",boxSizing:"border-box"}}/></div><button onClick={send} style={{...nB(C),width:42,height:42,borderRadius:10,fontSize:15,color:C.acc,display:"flex",alignItems:"center",justifyContent:"center"}}>↑</button></div>
</div>;}
 
/* ══ EXPORT ══ */
function Exp({book}){const{dk}=useT();const C=dk?TH.dark:TH.light;
const[sel,sS]=useState(()=>new Set(book?book.chapters.map((_,i)=>i):[]));
const tog=i=>{const n=new Set(sel);n.has(i)?n.delete(i):n.add(i);sS(n);};
const dl=()=>{if(!book||!sel.size)return;let md=`# ${book.title}\n\n*Extracted by BookBrain*\n\n`;
  book.chapters.forEach((ch,i)=>{if(!sel.has(i)||!ch.insights)return;const ins=ch.insights;
    md+=`---\n## ${ch.title}\n*Pages ${ch.ps}–${ch.pe} · ${ins.mode==='gemma'?'Gemma AI':'Smart Extract'}*\n\n`;
    if(ins.summary)md+=`**Summary:** ${ins.summary}\n\n`;
    if(ins.ideas.length){md+='### Key Ideas\n';ins.ideas.forEach(x=>md+=`- **${x.text}**\n  ${x.detail}\n\n`);}
    if(ins.quotes.length){md+='### Quotes\n';ins.quotes.forEach(x=>md+=`> "${x.text}"${x.p?' (p.'+x.p+')':''}\n\n`);}
    if(ins.stories.length){md+='### Stories\n';ins.stories.forEach(x=>md+=`- **${x.title}:** ${x.detail}\n\n`);}
    if(ins.stats.length){md+='### Statistics\n';ins.stats.forEach(x=>md+=`- **${x.fig}** — ${x.note}\n\n`);}
    if(ins.actions.length){md+='### Actions\n';ins.actions.forEach(x=>md+=`- [ ] ${x}\n`);md+='\n';}
    if(ins.terms.length){md+='### Terms\n';ins.terms.forEach(x=>md+=`- **${x.t}:** ${x.d}\n\n`);}
  });
  const b=new Blob([md],{type:'text/markdown'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=book.title.replace(/[^a-z0-9]/gi,'_')+'_BookBrain.md';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);};
if(!book)return null;
return<div style={{padding:14}}><h2 style={{fontFamily:fD,fontSize:19,fontWeight:700,color:C.tx,marginBottom:2}}>Export</h2><p style={{fontFamily:fB,fontSize:11,color:C.tx3,marginBottom:10}}>Markdown (.md) with all insights</p>
<div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:10}}>{book.chapters.map((ch,i)=><div key={i} onClick={()=>tog(i)} style={{...nC(C),padding:"8px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:7}}><div style={{...(sel.has(i)?nI(C):nC(C)),width:20,height:20,borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:C.acc,flexShrink:0}}>{sel.has(i)&&"✓"}</div><span style={{fontFamily:fB,fontSize:11,color:C.tx,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ch.title}</span></div>)}</div>
<button onClick={dl} disabled={!sel.size} style={{...nB(C),width:"100%",padding:"11px 0",fontFamily:fD,fontSize:14,fontWeight:700,color:sel.size?C.acc:C.tx3,opacity:sel.size?.9:.4}}>📤 Download {sel.size} Ch.</button></div>;}
 
/* ══ APP ══ */
function App(){
  const[scr,setSc]=useState(SC.LIB);const[books,setBks]=useState([]);const[aId,sAId]=useState(null);const[aCh,sACh]=useState(0);const[pFile,sPF]=useState(null);
  const[dk,sDk]=useState(false);
  const[gEngine,sGE]=useState(null);const[gLoad,sGL]=useState(false);const[gProg,sGP]=useState('');const[gErr,sGErr]=useState('');
  const ref=useRef(null);
  const nav=useCallback(s=>{setSc(s);if(ref.current)ref.current.scrollTop=0;},[]);
  const C=dk?TH.dark:TH.light;
  const togDk=useCallback(()=>{sDk(d=>{const n=!d;document.body.style.background=n?TH.dark.bg:TH.light.bg;document.getElementById('tc')?.setAttribute('content',n?TH.dark.bg:TH.light.bg);return n;});},[]);
  const aBook=books.find(b=>b.id===aId);const aChn=aBook?.chapters[aCh];
  const loadGemma=async()=>{
    const wl=window.__webllm;if(!wl){sGErr('WebGPU not available. Use Chrome 113+ with hardware acceleration enabled.');return;}
    sGL(true);sGErr('');sGP('Initializing…');
    try{const eng=await wl.CreateMLCEngine("gemma-2-2b-it-q4f16_1-MLC",{initProgressCallback:p=>{sGP(p.text||Math.round((p.progress||0)*100)+'%');}});sGE(eng);sGL(false);}
    catch(e){sGErr('Model load failed: '+e.message);sGL(false);}
  };
  const enhanceAll=async()=>{if(!gEngine||!aBook)return;
    const updated={...aBook,chapters:[...aBook.chapters]};
    for(let i=0;i<updated.chapters.length;i++){
      sGP(`AI: Ch. ${i+1}/${updated.chapters.length}`);
      const text=updated.chapters[i].pidx.map(pi=>aBook.pages[pi]?.text||'').join('\n');
      const res=await aiExtractChapter(gEngine,text);
      if(res)updated.chapters[i]={...updated.chapters[i],insights:res};
    }
    setBks(bs=>bs.map(b=>b.id===aBook.id?updated:b));sGP('Done!');
  };
  const enhanceCh=async()=>{if(!gEngine||!aBook||!aChn)return;
    sGP('AI extracting…');
    const text=aChn.pidx.map(pi=>aBook.pages[pi]?.text||'').join('\n');
    const res=await aiExtractChapter(gEngine,text);
    if(res){const updated={...aBook,chapters:[...aBook.chapters]};updated.chapters[aCh]={...updated.chapters[aCh],insights:res};setBks(bs=>bs.map(b=>b.id===aBook.id?updated:b));}
    sGP('Done!');
  };
  const safeNav=useCallback(s=>{if(!aBook&&s!==SC.LIB&&s!==SC.UP)return;nav(s);},[aBook,nav]);
  return<Ctx.Provider value={{dk,tog:togDk}}>
    <div style={{maxWidth:440,margin:"0 auto",background:C.bg,height:"100vh",display:"flex",flexDirection:"column",transition:"background .3s"}}>
      <TopNav scr={scr} onNav={nav} sub={aBook?.title&&![SC.LIB,SC.UP,SC.PROC].includes(scr)?aBook.title:null}/>
      <div ref={ref} style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",display:"flex",flexDirection:"column"}}>
        {scr===SC.LIB&&<Lib books={books} onNav={nav} onSel={sAId}/>}
        {scr===SC.UP&&<UL onNav={nav} onProcess={f=>{sPF(f);nav(SC.PROC);}}/>}
        {scr===SC.PROC&&pFile&&<Proc file={pFile} onDone={b=>{setBks(bs=>[...bs,b]);sAId(b.id);nav(SC.OV);}}/>}
        {scr===SC.OV&&<Ov book={aBook} onNav={nav} onCh={sACh} engine={gEngine} gLoading={gLoad} gProg={gProg} gErr={gErr} onLoadGemma={loadGemma} onEnhanceAll={enhanceAll}/>}
        {scr===SC.CH&&<ChV chapter={aChn} engine={gEngine} gLoading={gLoad} gProg={gProg} gErr={gErr} onLoadGemma={loadGemma} onEnhanceCh={enhanceCh} onNav={nav}/>}
        {scr===SC.MM&&<MM ch={aChn}/>}
        {scr===SC.QA&&<QAS book={aBook} engine={gEngine}/>}
        {scr===SC.EXP&&<Exp book={aBook}/>}
      </div>
      <BotBar scr={scr} onNav={safeNav}/>
    </div>
  </Ctx.Provider>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
